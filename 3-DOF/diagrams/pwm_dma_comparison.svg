<text x="450.0" y="42.0" class="title" text-anchor="middle">PWM Timing Problem and Fix</text>
<text x="450.0" y="66.0" class="subtitle" text-anchor="middle">Hardware-timed PWM made the closed-loop response repeatable</text>

<text x="338.0" y="486.0" class="tiny" text-anchor="middle">Find timing issue</text>
<rect x="455" y="468" width="130" height="25" rx="12" class="chip"/>
<text x="520.0" y="486.0" class="tiny" text-anchor="middle">Use pigpio hardware timing</text>

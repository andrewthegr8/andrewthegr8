<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { fill: #1a1a1a; font-size: 14px; font-weight: bold; }
      .label { fill: #34495e; font-size: 11px; }
      .good { stroke: #27ae60; stroke-width: 2; }
      .bad { stroke: #e74c3c; stroke-width: 2; }
      .axis { stroke: #95a5a6; stroke-width: 1; }
    </style>
  </defs>
  
  <text x="350" y="20" text-anchor="middle" class="title">PWM Signal Stability: Software-Timed vs DMA</text>
  
  <!-- LEFT: Software-Timed PWM (problematic) -->
  <text x="120" y="45" text-anchor="middle" class="title" fill="#e74c3c">BEFORE: Software-Timed PWM</text>
  <text x="120" y="62" text-anchor="middle" class="label">Jittery, unstable signal</text>
  
  <!-- Unstable waveform -->
  <line x1="30" y1="80" x2="210" y2="80" class="axis"/>
  <line x1="30" y1="80" x2="30" y2="150" class="axis"/>
  
  <!-- Bad PWM signal (irregular) -->
  <path d="M 40 150 L 40 100 L 55 100 L 55 150 L 70 150 L 70 110 L 85 110 L 85 150 L 100 150 L 100 95 L 115 95 L 115 150 L 130 150 L 130 105 L 145 105 L 145 150 L 160 150 L 160 98 L 175 98 L 175 150 L 190 150 L 190 108 L 210 108 L 210 150" class="bad" fill="none"/>
  
  <text x="120" y="165" text-anchor="middle" class="label">Timing jitter due to</text>
  <text x="120" y="178" text-anchor="middle" class="label">OS context switching</text>
  
  <!-- Problem box -->
  <rect x="20" y="195" width="200" height="100" fill="#ffe6e6" stroke="#e74c3c" stroke-width="1" rx="5"/>
  <text x="120" y="215" text-anchor="middle" class="label" font-weight="bold">Issues Observed:</text>
  <text x="30" y="235" class="label">• Controller oscillation</text>
  <text x="30" y="250" class="label">• Encoder feedback lag</text>
  <text x="30" y="265" class="label">• Erratic motor behavior</text>
  <text x="30" y="280" class="label">• Poor trajectory tracking</text>
  
  <!-- RIGHT: DMA-Based PWM (solution) -->
  <text x="550" y="45" text-anchor="middle" class="title" fill="#27ae60">AFTER: DMA-Based PWM</text>
  <text x="550" y="62" text-anchor="middle" class="label">Clean, deterministic signal</text>
  
  <!-- Clean waveform -->
  <line x1="460" y1="80" x2="640" y2="80" class="axis"/>
  <line x1="460" y1="80" x2="460" y2="150" class="axis"/>
  
  <!-- Good PWM signal (regular) -->
  <path d="M 470 150 L 470 100 L 485 100 L 485 150 L 500 150 L 500 100 L 515 100 L 515 150 L 530 150 L 530 100 L 545 100 L 545 150 L 560 150 L 560 100 L 575 100 L 575 150 L 590 150 L 590 100 L 605 100 L 605 150 L 620 150 L 620 100 L 640 100 L 640 150" class="good" fill="none"/>
  
  <text x="550" y="165" text-anchor="middle" class="label">Hardware timer ensures</text>
  <text x="550" y="178" text-anchor="middle" class="label">consistent timing</text>
  
  <!-- Solution box -->
  <rect x="450" y="195" width="200" height="100" fill="#e6ffe6" stroke="#27ae60" stroke-width="1" rx="5"/>
  <text x="550" y="215" text-anchor="middle" class="label" font-weight="bold">Improvements:</text>
  <text x="460" y="235" class="label">• Zero jitter</text>
  <text x="460" y="250" class="label">• Deterministic timing</text>
  <text x="460" y="265" class="label">• Stable control loops</text>
  <text x="460" y="280" class="label">• Predictable response</text>
</svg>
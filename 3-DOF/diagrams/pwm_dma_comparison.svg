<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="545" viewBox="0 0 900 545" role="img">
  <defs>
    <style>
      .bg { fill: #07111f; }
      .panel { fill: #0a1628; stroke: #223957; stroke-width: 1.4; }
      .panel2 { fill: #0f2138; stroke: #315273; stroke-width: 1.4; }
      .panel3 { fill: #102b35; stroke: #2c6d73; stroke-width: 1.4; }
      .chip { fill: #0f2138; stroke: #315273; stroke-width: 1.2; }
      .labelBg { fill: #07111f; stroke: #5eead4; stroke-width: 1.1; }
      .title { fill: #f7fbff; font: 700 25px Arial, sans-serif; }
      .subtitle { fill: #b8cbe0; font: 500 14px Arial, sans-serif; }
      .label { fill: #e7f0fa; font: 700 13px Arial, sans-serif; }
      .small { fill: #b8cbe0; font: 500 12px Arial, sans-serif; }
      .tiny { fill: #93acc8; font: 500 10.5px Arial, sans-serif; }
      .mono { fill: #e9f3ff; font: 700 13px Consolas, Menlo, monospace; }
      .cyan { fill: #5eead4; }
      .blue { fill: #60a5fa; }
      .green { fill: #86efac; }
      .pink { fill: #fb7185; }
      .amber { fill: #fbbf24; }
      .gridline { stroke: #203650; stroke-width: 1; }
      .axis { stroke: #6f8cab; stroke-width: 1.5; }
      .arrow { stroke: #b8cbe0; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrowCyan { stroke: #5eead4; stroke-width: 2.6; fill: none; marker-end: url(#arrowCyan); stroke-linecap: round; stroke-linejoin: round; }
      .wire { stroke: #6f8cab; stroke-width: 2.0; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .lineCyan { stroke: #5eead4; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .lineBlue { stroke: #60a5fa; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#b8cbe0" />
    </marker>
    <marker id="arrowCyan" markerWidth="11" markerHeight="11" refX="9.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#5eead4" />
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%" rx="18"/>
<text x="450.0" y="42.0" class="title" text-anchor="middle">PWM Duty-Cycle Debugging</text>
<text x="450.0" y="66.0" class="subtitle" text-anchor="middle">Oscilloscope testing showed the software PWM output did not match the commanded duty cycle</text>
<rect x="50.0" y="112.0" width="350.0" height="276.0" rx="15.0" class="panel"/>
<text x="225.0" y="145.0" class="label" text-anchor="middle">Original software PWM library</text>
<text x="225.0" y="168.0" class="tiny" text-anchor="middle">Controller tuning could not produce reliable motor behavior</text>
<text x="225.0" y="195.0" class="small" text-anchor="middle">Oscilloscope measurement</text>
<text x="225.0" y="213.0" class="tiny" text-anchor="middle">commanded duty did not equal measured duty</text>
<path d="M92,304 L92,224 L126,224 L126,304 L143,304 L143,224 L165,224 L165,304 L194,304 L194,224 L237,224 L237,304 L250,304 L250,224 L277,224 L277,304 L304,304 L304,224 L342,224 L342,304 L358,304" fill="none" stroke="#fb7185" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
<text x="225.0" y="340.0" class="tiny" text-anchor="middle">Mismatch explained the failed tuning response</text>
<rect x="500.0" y="112.0" width="350.0" height="276.0" rx="15.0" class="panel2"/>
<text x="675.0" y="145.0" class="label" text-anchor="middle">pigpio hardware-timed PWM</text>
<text x="675.0" y="168.0" class="tiny" text-anchor="middle">Library change produced the requested duty cycle</text>
<text x="675.0" y="195.0" class="small" text-anchor="middle">Oscilloscope verification</text>
<text x="675.0" y="213.0" class="tiny" text-anchor="middle">measured waveform matched command</text>
<path d="M544,304 L544,304 L544,224 L571,224 L571,304 L587,304 L587,224 L614,224 L614,304 L630,304 L630,224 L657,224 L657,304 L673,304 L673,224 L700,224 L700,304 L716,304 L716,224 L743,224 L743,304 L759,304 L759,224 L786,224 L786,304 L806,304" fill="none" stroke="#86efac" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
<text x="675.0" y="340.0" class="tiny" text-anchor="middle">Verified PWM made tuning repeatable</text>
<g aria-label="library change"><path d="M418 245 H466 V226 L492 256 L466 286 V267 H418 Z" fill="#123c45" stroke="#5eead4" stroke-width="1.8" stroke-linejoin="round"/></g>
<text x="455.0" y="328.0" class="tiny" text-anchor="middle">library change</text>
<rect x="48.0" y="420.0" width="804.0" height="108.0" rx="15.0" class="panel"/>
<text x="450.0" y="449.0" class="label" text-anchor="middle">Debugging sequence</text>
<path d="M186 491 H205" class="arrow"/>
<path d="M349 491 H368" class="arrow"/>
<path d="M512 491 H531" class="arrow"/>
<path d="M675 491 H694" class="arrow"/>
<rect x="46" y="466" width="140" height="50" rx="16" class="chip"/>
<circle cx="69" cy="491" r="13" fill="#5eead4"/>
<text x="69.0" y="496.0" class="label" text-anchor="middle">1</text>
<text x="130.0" y="486.0" class="tiny" text-anchor="middle">Tune controllers</text>
<text x="130.0" y="502.0" class="tiny" text-anchor="middle">behavior still wrong</text>
<rect x="209" y="466" width="140" height="50" rx="16" class="chip"/>
<circle cx="232" cy="491" r="13" fill="#5eead4"/>
<text x="232.0" y="496.0" class="label" text-anchor="middle">2</text>
<text x="293.0" y="486.0" class="tiny" text-anchor="middle">Probe PWM with</text>
<text x="293.0" y="502.0" class="tiny" text-anchor="middle">oscilloscope</text>
<rect x="372" y="466" width="140" height="50" rx="16" class="chip"/>
<circle cx="395" cy="491" r="13" fill="#5eead4"/>
<text x="395.0" y="496.0" class="label" text-anchor="middle">3</text>
<text x="456.0" y="486.0" class="tiny" text-anchor="middle">Identify duty-cycle</text>
<text x="456.0" y="502.0" class="tiny" text-anchor="middle">mismatch</text>
<rect x="535" y="466" width="140" height="50" rx="16" class="chip"/>
<circle cx="558" cy="491" r="13" fill="#5eead4"/>
<text x="558.0" y="496.0" class="label" text-anchor="middle">4</text>
<text x="619.0" y="486.0" class="tiny" text-anchor="middle">Switch PWM</text>
<text x="619.0" y="502.0" class="tiny" text-anchor="middle">library</text>
<rect x="698" y="466" width="140" height="50" rx="16" class="chip"/>
<circle cx="721" cy="491" r="13" fill="#5eead4"/>
<text x="721.0" y="496.0" class="label" text-anchor="middle">5</text>
<text x="782.0" y="486.0" class="tiny" text-anchor="middle">Verify waveform</text>
<text x="782.0" y="502.0" class="tiny" text-anchor="middle">then deploy</text>
</svg>

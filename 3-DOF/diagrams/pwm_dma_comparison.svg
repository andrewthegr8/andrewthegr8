<path d="M533,302 L533,302 L533,222 L567,222 L567,302 L589,302 L589,222 L623,222 L623,302 L645,302 L645,222 L679,222 L679,302 L701,302 L701,222 L735,222 L735,302 L757,302 L757,222 L791,222 L791,302 L813,302 L813,222 L847,222 L847,302 " fill="none" stroke="#86efac" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
<text x="675.0" y="348.0" class="tiny" text-anchor="middle">Consistent pulse timing produces repeatable motion</text>

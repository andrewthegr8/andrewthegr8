<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" role="img">
  <defs>
    <style>
      .bg { fill: #07111f; }
      .panel { fill: #0a1628; stroke: #223957; stroke-width: 1.4; }
      .panel2 { fill: #0f2138; stroke: #315273; stroke-width: 1.4; }
      .panel3 { fill: #102b35; stroke: #2c6d73; stroke-width: 1.4; }
      .chip { fill: #0f2138; stroke: #315273; stroke-width: 1.2; }
      .labelBg { fill: #07111f; stroke: #5eead4; stroke-width: 1.1; }
      .title { fill: #f7fbff; font: 700 25px Arial, sans-serif; }
      .subtitle { fill: #b8cbe0; font: 500 14px Arial, sans-serif; }
      .label { fill: #e7f0fa; font: 700 13px Arial, sans-serif; }
      .small { fill: #b8cbe0; font: 500 12px Arial, sans-serif; }
      .tiny { fill: #93acc8; font: 500 10.5px Arial, sans-serif; }
      .mono { fill: #e9f3ff; font: 700 13px Consolas, Menlo, monospace; }
      .cyan { fill: #5eead4; }
      .blue { fill: #60a5fa; }
      .green { fill: #86efac; }
      .pink { fill: #fb7185; }
      .amber { fill: #fbbf24; }
      .gridline { stroke: #203650; stroke-width: 1; }
      .axis { stroke: #6f8cab; stroke-width: 1.5; }
      .arrow { stroke: #b8cbe0; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrowCyan { stroke: #5eead4; stroke-width: 2.6; fill: none; marker-end: url(#arrowCyan); stroke-linecap: round; stroke-linejoin: round; }
      .wire { stroke: #6f8cab; stroke-width: 2.0; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .lineCyan { stroke: #5eead4; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .lineBlue { stroke: #60a5fa; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#b8cbe0" />
    </marker>
    <marker id="arrowCyan" markerWidth="11" markerHeight="11" refX="9.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#5eead4" />
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%" rx="18"/>
<text x="450.0" y="42.0" class="title" text-anchor="middle">Cubic Spline Trajectory Generation</text>
<text x="450.0" y="66.0" class="subtitle" text-anchor="middle">Zero-velocity boundary conditions create smooth point-to-point motion</text>
<rect x="40.0" y="105.0" width="390.0" height="185.0" rx="15.0" class="panel"/>
<text x="70.0" y="140.0" class="label" text-anchor="start">Position target p(t)</text>
<text x="70.0" y="174.0" class="mono" text-anchor="start">p(t) = c0 + c1*t + c2*t^2 + c3*t^3</text>
<text x="70.0" y="218.0" class="label" text-anchor="start">Velocity target v(t)</text>
<text x="70.0" y="252.0" class="mono" text-anchor="start">v(t) = c1 + 2*c2*t + 3*c3*t^2</text>
<rect x="470.0" y="105.0" width="390.0" height="185.0" rx="15.0" class="panel2"/>
<text x="500.0" y="140.0" class="label" text-anchor="start">Boundary conditions</text>
<text x="525.0" y="176.0" class="mono" text-anchor="start">p(0) = start</text>
<text x="525.0" y="200.0" class="mono" text-anchor="start">v(0) = 0</text>
<text x="525.0" y="224.0" class="mono" text-anchor="start">p(T) = target</text>
<text x="525.0" y="248.0" class="mono" text-anchor="start">v(T) = 0</text>
<rect x="40.0" y="325.0" width="820.0" height="205.0" rx="15.0" class="panel"/>
<text x="70.0" y="362.0" class="label" text-anchor="start">4x4 coefficient solve</text>
<text x="88.0" y="405.0" class="mono" text-anchor="start">[1   0    0      0  ] [c0]   [start]</text>
<text x="88.0" y="433.0" class="mono" text-anchor="start">[0   1    0      0  ] [c1] = [  0  ]</text>
<text x="88.0" y="461.0" class="mono" text-anchor="start">[1   T    T^2    T^3] [c2]   [target]</text>
<text x="88.0" y="489.0" class="mono" text-anchor="start">[0   1    2T    3T^2] [c3]   [  0  ]</text>
<text x="560.0" y="402.0" class="label" text-anchor="start">Closed-form coefficients</text>
<text x="560.0" y="434.0" class="mono" text-anchor="start">c0 = start</text>
<text x="560.0" y="462.0" class="mono" text-anchor="start">c1 = 0</text>
<text x="560.0" y="490.0" class="mono" text-anchor="start">c2 = 3*(target-start)/T^2</text>
<text x="560.0" y="518.0" class="mono" text-anchor="start">c3 = -2*(target-start)/T^3</text>
<rect x="40.0" y="565.0" width="820.0" height="120.0" rx="15.0" class="panel2"/>
<line x1="90" y1="650" x2="540" y2="650" class="axis"/>
<line x1="90" y1="650" x2="90" y2="585" class="axis"/>
<path d="M100,650 C190,650 205,595 318,595 C430,595 445,650 525,650" class="lineCyan"/>
<circle cx="100" cy="650" r="5" class="cyan"/><circle cx="525" cy="650" r="5" class="cyan"/>
<text x="100.0" y="674.0" class="tiny" text-anchor="middle">start</text>
<text x="525.0" y="674.0" class="tiny" text-anchor="middle">target</text>
<text x="655.0" y="609.0" class="label" text-anchor="start">Effect on the robot</text>
<text x="655.0" y="635.0" class="small" text-anchor="start">Smooth position targets reduce</text>
<text x="655.0" y="657.0" class="small" text-anchor="start">jerky motion and overshoot.</text>
</svg>

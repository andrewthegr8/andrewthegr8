<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="645" viewBox="0 0 1000 645" role="img">
  <defs>
    <style>
      .bg { fill: #07111f; }
      .panel { fill: #0a1628; stroke: #223957; stroke-width: 1.4; }
      .panel2 { fill: #0f2138; stroke: #315273; stroke-width: 1.4; }
      .panel3 { fill: #102b35; stroke: #2c6d73; stroke-width: 1.4; }
      .chip { fill: #0f2138; stroke: #315273; stroke-width: 1.2; }
      .labelBg { fill: #07111f; stroke: #5eead4; stroke-width: 1.1; }
      .title { fill: #f7fbff; font: 700 25px Arial, sans-serif; }
      .subtitle { fill: #b8cbe0; font: 500 14px Arial, sans-serif; }
      .label { fill: #e7f0fa; font: 700 13px Arial, sans-serif; }
      .small { fill: #b8cbe0; font: 500 12px Arial, sans-serif; }
      .tiny { fill: #93acc8; font: 500 10.5px Arial, sans-serif; }
      .mono { fill: #e9f3ff; font: 700 13px Consolas, Menlo, monospace; }
      .cyan { fill: #5eead4; }
      .blue { fill: #60a5fa; }
      .green { fill: #86efac; }
      .pink { fill: #fb7185; }
      .amber { fill: #fbbf24; }
      .gridline { stroke: #203650; stroke-width: 1; }
      .axis { stroke: #6f8cab; stroke-width: 1.5; }
      .arrow { stroke: #b8cbe0; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrowCyan { stroke: #5eead4; stroke-width: 2.6; fill: none; marker-end: url(#arrowCyan); stroke-linecap: round; stroke-linejoin: round; }
      .wire { stroke: #6f8cab; stroke-width: 2.0; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .lineCyan { stroke: #5eead4; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .lineBlue { stroke: #60a5fa; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#b8cbe0" />
    </marker>
    <marker id="arrowCyan" markerWidth="11" markerHeight="11" refX="9.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#5eead4" />
    </marker>
  </defs>
  <rect class="bg" width="100%" height="100%" rx="18"/>
<text x="500.0" y="42.0" class="title" text-anchor="middle">Closed-Loop Control Architecture</text>
<text x="500.0" y="66.0" class="subtitle" text-anchor="middle">Spline targets, encoder feedback, controller correction, and hardware-timed PWM</text>
<rect x="65.0" y="120.0" width="160.0" height="70.0" rx="15.0" class="panel"/>
<text x="145.0" y="151.0" class="label" text-anchor="middle">Waypoint Plan</text>
<text x="145.0" y="173.0" class="tiny" text-anchor="middle">joint targets</text>
<rect x="285.0" y="120.0" width="170.0" height="70.0" rx="15.0" class="panel2"/>
<text x="370.0" y="151.0" class="label" text-anchor="middle">Cubic Spline</text>
<text x="370.0" y="173.0" class="tiny" text-anchor="middle">desired p(t)</text>
<rect x="535.0" y="120.0" width="160.0" height="70.0" rx="15.0" class="panel2"/>
<text x="615.0" y="151.0" class="label" text-anchor="middle">Error</text>
<text x="615.0" y="173.0" class="tiny" text-anchor="middle">target - actual</text>
<rect x="760.0" y="120.0" width="170.0" height="70.0" rx="15.0" class="panel3"/>
<text x="845.0" y="151.0" class="label" text-anchor="middle">PI / PID</text>
<text x="845.0" y="173.0" class="tiny" text-anchor="middle">5 motor loops</text>
<rect x="760.0" y="315.0" width="170.0" height="70.0" rx="15.0" class="panel3"/>
<text x="845.0" y="346.0" class="label" text-anchor="middle">PWM Output</text>
<text x="845.0" y="368.0" class="tiny" text-anchor="middle">duty + direction</text>
<rect x="535.0" y="315.0" width="170.0" height="70.0" rx="15.0" class="panel"/>
<text x="620.0" y="346.0" class="label" text-anchor="middle">Motor Drivers</text>
<text x="620.0" y="368.0" class="tiny" text-anchor="middle">MD10C boards</text>
<rect x="285.0" y="315.0" width="170.0" height="70.0" rx="15.0" class="panel"/>
<text x="370.0" y="346.0" class="label" text-anchor="middle">Mechanism</text>
<text x="370.0" y="368.0" class="tiny" text-anchor="middle">5 DC motors</text>
<rect x="65.0" y="315.0" width="170.0" height="70.0" rx="15.0" class="panel"/>
<text x="150.0" y="346.0" class="label" text-anchor="middle">Encoders</text>
<text x="150.0" y="368.0" class="tiny" text-anchor="middle">position feedback</text>
<rect x="535.0" y="475.0" width="170.0" height="70.0" rx="15.0" class="panel"/>
<text x="620.0" y="506.0" class="label" text-anchor="middle">Telemetry</text>
<text x="620.0" y="528.0" class="tiny" text-anchor="middle">CSV logging</text>
<path class="arrowCyan" d="M225,155 L285,155"/>
<path class="arrowCyan" d="M455,155 L535,155"/>
<path class="arrowCyan" d="M695,155 L760,155"/>
<path class="arrowCyan" d="M845,190 L845,315"/>
<path class="arrowCyan" d="M760,350 L705,350"/>
<path class="arrowCyan" d="M535,350 L455,350"/>
<path class="arrowCyan" d="M285,350 L235,350"/>
<path class="wire" d="M620,385 L620,475"/>
<path class="wire" d="M65,350 L34,350 L34,96 L615,96 L615,120"/>
<text x="244.0" y="90.0" class="tiny" text-anchor="middle">encoder feedback</text>
<rect x="230.0" y="570.0" width="540.0" height="42.0" rx="15.0" class="panel"/>
<text x="500.0" y="597.0" class="small" text-anchor="middle">Measured position closes the loop; PWM commands drive the next actuator update</text>
</svg>

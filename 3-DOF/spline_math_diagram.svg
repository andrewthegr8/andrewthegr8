<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { fill: #1a1a1a; font-size: 18px; font-weight: bold; }
      .subtitle { fill: #34495e; font-size: 12px; font-weight: bold; }
      .label { fill: #2c3e50; font-size: 11px; }
      .math { fill: #1a1a1a; font-size: 13px; font-family: "Courier New", monospace; }
      .box { fill: #f8f9fa; stroke: #bdc3c7; stroke-width: 1; }
      .border { fill: none; stroke: #34495e; stroke-width: 1.5; }
      .accent { fill: #3498db; }
      .text-normal { font-family: Arial, sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="750" fill="white"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Cubic Spline Trajectory Interpolation</text>
  <text x="450" y="48" text-anchor="middle" class="label">Zero-velocity boundary conditions for smooth waypoint transitions</text>
  
  <!-- Section 1: Cubic Polynomial -->
  <g>
    <rect x="30" y="65" width="420" height="140" class="box" rx="6"/>
    <text x="50" y="85" class="subtitle">Cubic Polynomial Form</text>
    
    <text x="50" y="110" class="math">p(t) = c0 + c1*t + c2*t^2 + c3*t^3</text>
    <text x="50" y="130" class="label">where:</text>
    <text x="65" y="148" class="math">- p(t) = position at time t</text>
    <text x="65" y="165" class="math">- c0, c1, c2, c3 = coefficients to solve for</text>
    <text x="65" y="182" class="math">- t in [0, T] = normalized time within transition</text>
  </g>
  
  <!-- Section 2: Boundary Conditions -->
  <g>
    <rect x="480" y="65" width="420" height="140" class="box" rx="6"/>
    <text x="500" y="85" class="subtitle">Boundary Conditions</text>
    
    <text x="500" y="110" class="math">p(0) = p0        (start position)</text>
    <text x="500" y="130" class="math">dp/dt(0) = 0      (zero initial velocity)</text>
    <text x="500" y="150" class="math">p(T) = pf        (end position)</text>
    <text x="500" y="170" class="math">dp/dt(T) = 0      (zero final velocity)</text>
    <text x="500" y="190" class="label" style="font-style: italic;">- Ensures smooth acceleration at endpoints</text>
  </g>
  
  <!-- Section 3: Derivative -->
  <g>
    <rect x="30" y="225" width="870" height="100" class="box" rx="6"/>
    <text x="50" y="245" class="subtitle">Velocity Function (derivative)</text>
    
    <text x="50" y="270" class="math">dp/dt(t) = c1 + 2*c2*t + 3*c3*t^2</text>
    <text x="500" y="270" class="math">d2p/dt2(t) = 2*c2 + 6*c3*t</text>
    
    <text x="50" y="295" class="label">Boundary conditions on velocity:</text>
    <text x="65" y="312" class="math">dp/dt(0) = 0  =>  c1 = 0</text>
    <text x="300" y="312" class="math">dp/dt(T) = 0  =>  c1 + 2*c2*T + 3*c3*T^2 = 0</text>
  </g>
  
  <!-- Section 4: Linear System -->
  <g>
    <rect x="30" y="345" width="870" height="300" class="box" rx="6"/>
    <text x="50" y="365" class="subtitle">Linear System: A*c = b</text>
    
    <!-- Matrix representation -->
    <text x="50" y="395" class="label">Solve this 4x4 system for coefficients [c0, c1, c2, c3]:</text>
    
    <!-- Left Matrix A -->
    <text x="60" y="430" class="math">[ 1   0    0     0  ]   [ c0 ]   [ p0 ]</text>
    <text x="60" y="450" class="math">[ 0   1    0     0  ]   [ c1 ]   [  0 ]</text>
    <text x="60" y="470" class="math">[ 1   T   T^2   T^3 ] * [ c2 ] = [ pf ]</text>
    <text x="60" y="490" class="math">[ 0   1   2*T  3*T^2]   [ c3 ]   [  0 ]</text>
    
    <!-- Row labels -->
    <text x="320" y="430" class="label">(Row 1: p(0) = p0)</text>
    <text x="320" y="450" class="label">(Row 2: dp/dt(0) = 0)</text>
    <text x="320" y="470" class="label">(Row 3: p(T) = pf)</text>
    <text x="320" y="490" class="label">(Row 4: dp/dt(T) = 0)</text>
    
    <!-- Solve explanation -->
    <text x="50" y="530" class="label"><b>Solution:</b> Use Gaussian elimination or matrix inversion</text>
    <text x="50" y="550" class="math">c = A^(-1) * b</text>
    
    <!-- Closed-form solution -->
    <text x="50" y="585" class="label"><b>Closed-form coefficients:</b></text>
    <text x="65" y="605" class="math">c0 = p0</text>
    <text x="280" y="605" class="math">c1 = 0</text>
    
    <text x="65" y="625" class="math">c2 = (3/T^2) * (pf - p0)</text>
    <text x="380" y="625" class="math">c3 = (-2/T^3) * (pf - p0)</text>
  </g>
  
  <!-- Section 5: Implementation Note -->
  <g>
    <rect x="30" y="665" width="870" height="65" class="box" fill="#e3f2fd" stroke="#3498db" stroke-width="2" rx="6"/>
    <text x="50" y="685" class="subtitle" fill="#1976d2">Implementation: Real-Time Evaluation</text>
    <text x="50" y="705" class="label">At each 5ms control cycle: Evaluate p(t) and dp/dt(t) for current time to get desired position and velocity</text>
  </g>
</svg>